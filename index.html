<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookly</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="navbar">
        <h1 color="black">Bookly</h1>
    </div>

    <div class="container">
        <div class="book-container">
            <h2>Once Upon A Time</h2>
            <h4>Loki</h4>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Cum incidunt autem eos, repellendus sint
                ratione. Aut rerum corporis quisquam commodi eligendi quasi molestiae, neque veritatis maiores,
                corrupti, dolore vero magnam.</p>
            <button onclick="deletebook(event)">Delete</button>

        </div>
    </div>

    <div class="popup-overlay"></div>
    <div class="popup-box">
        <h2>Add Book</h2>
        <form>

            <input type="text" placeholder="Book Title" id="book-input-title">
            <input type="text" placeholder="Book Author" id="book-input-author">
            <textarea placeholder="Add Descriotion" id="book-input-comment"></textarea>

            <button id="add-book">ADD</button>
            <button id="cancel-book">CANCEL</button>
        </form>
    </div>

    <button class="add-button" id="add-pop-button">+</button>


    <script src="script.js"></script>
</body>

</html>
